name: Manter Streamlit Acordado

on:
  schedule:
    - cron: '0 12 * * *' # Roda todos os dias
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Fazer um ping no Streamlit
        run: |
          # Pega apenas o código de status HTTP da requisição (ex: 200, 303, 302)
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://observatorio-ati.streamlit.app/)
          
          echo "O servidor respondeu com o status HTTP: $STATUS"
          
          # Se o status começar com 2 (Sucesso) ou 3 (Redirecionamento do Streamlit), está tudo certo!
          if [[ "$STATUS" == 2* ]] || [[ "$STATUS" == 3* ]]; then
            echo "✅ Ping realizado com sucesso! O tráfego foi gerado e o app continuará acordado."
          else
            echo "⚠️ Aviso: Status diferente do esperado ($STATUS), mas o ping foi enviado."
          fi